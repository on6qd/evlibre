@args (boolean online)

@if (online) {
<span class="inline-flex items-center gap-1.5 border border-success/40 bg-success/10 text-success px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">
    <span class="w-1.5 h-1.5 bg-success"></span>ONLINE
</span>
} else {
<span class="inline-flex items-center gap-1.5 border border-base-content/20 bg-base-300/40 text-base-content/60 px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">
    <span class="w-1.5 h-1.5 bg-base-content/40"></span>OFFLINE
</span>
}
