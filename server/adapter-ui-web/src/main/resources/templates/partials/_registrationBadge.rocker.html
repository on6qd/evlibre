@args (String status)

@if (status.equals("ACCEPTED")) {
<span class="inline-flex items-center rounded-full bg-success/15 text-success px-2 py-0.5 text-xs font-medium font-sans">Accepted</span>
} else if (status.equals("PENDING")) {
<span class="inline-flex items-center rounded-full bg-warning/15 text-warning px-2 py-0.5 text-xs font-medium font-sans">Pending</span>
} else if (status.equals("REJECTED")) {
<span class="inline-flex items-center rounded-full bg-error/15 text-error px-2 py-0.5 text-xs font-medium font-sans">Rejected</span>
} else {
<span class="inline-flex items-center rounded-full bg-base-300 text-base-content/70 px-2 py-0.5 text-xs font-medium font-sans">@status</span>
}
