@args (String status)

@if (status.equals("ACCEPTED")) {
<span class="inline-flex items-center border border-success/40 bg-success/10 text-success px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">ACCEPTED</span>
} else if (status.equals("PENDING")) {
<span class="inline-flex items-center border border-warning/40 bg-warning/10 text-warning px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">PENDING</span>
} else if (status.equals("REJECTED")) {
<span class="inline-flex items-center border border-error/40 bg-error/10 text-error px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">REJECTED</span>
} else {
<span class="inline-flex items-center border border-base-content/20 bg-base-300/40 text-base-content/60 px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium">@status</span>
}
