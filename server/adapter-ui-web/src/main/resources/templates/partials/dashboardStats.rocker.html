@import com.evlibre.server.adapter.webui.dto.DashboardStats

@args (DashboardStats stats)

<div class="stat-grid">
    <div class="stat-card">
        <div class="label">total stations</div>
        <div class="value">@stats.totalStations()</div>
    </div>
    <div class="stat-card">
        <div class="label">online</div>
        <div class="value green">@stats.onlineStations()</div>
    </div>
    <div class="stat-card">
        <div class="label">offline</div>
        <div class="value red">@stats.offlineStations()</div>
    </div>
    <div class="stat-card">
        <div class="label">uptime</div>
        <div class="value blue">@stats.uptimePercentage()%</div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">network uptime</div>
    <div class="panel-body">
        <div class="progress-bar">
            <div class="fill" style="width: @stats.uptimePercentage()%"></div>
        </div>
        <div style="color:var(--fg-dim);font-size:11px;margin-top:6px;">@stats.uptimePercentage()% uptime across all stations</div>
    </div>
</div>
