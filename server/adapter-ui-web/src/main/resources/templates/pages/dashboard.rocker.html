@import com.evlibre.server.adapter.webui.dto.DashboardStats
@import layouts.main

@args (DashboardStats stats, String tenantId)

@main.template("Dashboard", tenantId) -> {
    <div hx-sse="connect:/@tenantId/events/stations">
        <div class="page-header">
            <h1>&gt; dashboard</h1>
            <p>charging network overview</p>
        </div>

        <div id="dashboard-stats" hx-sse="swap:dashboard-stats" hx-swap="innerHTML">
            @partials.dashboardStats.template(stats)
        </div>

        <div class="panel">
            <div class="panel-header">quick actions</div>
            <div class="panel-body">
                <a href="/@tenantId/stations" class="btn">view all stations</a>
            </div>
        </div>
    </div>
}
