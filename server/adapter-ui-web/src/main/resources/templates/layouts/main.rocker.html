@args (String title, String tenantId, RockerBody body)

<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@title // evlibre</title>
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="font-sans bg-base-200 text-base-content min-h-screen flex flex-col">
    <header class="bg-base-100 border-b border-base-300">
        <div class="mx-auto max-w-7xl flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-6">
                <a href="/@tenantId/dashboard" class="text-base font-semibold tracking-tight text-base-content">evlibre</a>
                <nav class="flex gap-5 text-sm">
                    <a href="/@tenantId/dashboard" class="text-base-content/70 hover:text-base-content">Dashboard</a>
                    <a href="/@tenantId/stations" class="text-base-content/70 hover:text-base-content">Stations</a>
                </nav>
            </div>
            <div class="text-xs text-base-content/60">
                Tenant <span class="ml-1 font-mono text-base-content">@tenantId</span>
            </div>
        </div>
    </header>

    <main class="flex-1">
        <div class="mx-auto max-w-7xl px-4 py-8">
            @body
        </div>
    </main>

    <footer class="border-t border-base-300 mt-12 py-4 text-center text-xs text-base-content/50">
        evlibre · open source EV charging platform
    </footer>
</body>
</html>
