@args (String title, String tenantId, RockerBody body)

<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@title // evlibre</title>
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>

        :root {
            --bg: #0a0a0a;
            --fg: #b0b0b0;
            --accent: #00ff88;
            --accent-dim: #00aa55;
            --warn: #ffaa00;
            --error: #ff4444;
            --border: #333;
            --bg-panel: #111;
            --bg-hover: #1a1a1a;
            --fg-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            background: var(--bg);
            color: var(--fg);
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

        /* Top bar */
        .topbar {
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            background: var(--bg-panel);
        }
        .topbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar .logo {
            color: var(--accent);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
        }
        .topbar nav { display: flex; gap: 24px; }
        .topbar nav a {
            color: var(--fg-dim);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: all 0.15s;
        }
        .topbar nav a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
            text-decoration: none;
        }
        .tenant-badge {
            color: var(--fg-dim);
            font-size: 11px;
        }
        .tenant-badge span { color: var(--warn); }

        /* Main content */
        main { padding: 24px 0; }

        /* Page header */
        .page-header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            color: var(--accent);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .page-header p {
            color: var(--fg-dim);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Panels */
        .panel {
            border: 1px solid var(--border);
            background: var(--bg-panel);
            margin-bottom: 16px;
        }
        .panel-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--fg);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.02);
        }
        .panel-body { padding: 12px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 6px 12px;
            color: var(--fg-dim);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            font-weight: 400;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(51,51,51,0.5);
            font-size: 12px;
        }
        tr:hover td { background: var(--bg-hover); }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-online { color: var(--accent); border-color: var(--accent-dim); }
        .badge-offline { color: var(--error); border-color: #882222; }
        .badge-accepted { color: var(--accent); border-color: var(--accent-dim); }
        .badge-pending { color: var(--warn); border-color: #886600; }
        .badge-rejected { color: var(--error); border-color: #882222; }

        /* Stat grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            border: 1px solid var(--border);
            background: var(--bg-panel);
            padding: 12px;
        }
        .stat-card .label {
            color: var(--fg-dim);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-card .value.green { color: var(--accent); }
        .stat-card .value.red { color: var(--error); }
        .stat-card .value.amber { color: var(--warn); }
        .stat-card .value.blue { color: #44aaff; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            color: var(--fg);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            text-decoration: none;
        }
        .btn-danger:hover {
            border-color: var(--error);
            color: var(--error);
        }
        .btn-warn:hover {
            border-color: var(--warn);
            color: var(--warn);
        }
        .btn:disabled, .btn.htmx-request {
            opacity: 0.4;
            cursor: wait;
        }

        /* Command result */
        .cmd-result {
            padding: 6px 12px;
            border: 1px solid var(--border);
            font-size: 11px;
            margin-top: 8px;
        }
        .cmd-result.ok { border-color: var(--accent-dim); color: var(--accent); }
        .cmd-result.err { border-color: #882222; color: var(--error); }

        /* Progress bar */
        .progress-bar {
            height: 3px;
            background: var(--border);
            margin-top: 8px;
        }
        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        /* Forms */
        .form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .form-label {
            color: var(--fg-dim);
            font-size: 11px;
            min-width: 100px;
        }
        input, select {
            font-family: inherit;
            font-size: 12px;
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border);
            padding: 12px 0;
            margin-top: 32px;
            text-align: center;
            color: var(--fg-dim);
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* Detail grid */
        .detail-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 4px 16px;
            font-size: 12px;
        }
        .detail-grid .key { color: var(--fg-dim); }
        .detail-grid .val { color: var(--fg); }

        /* Command grid */
        .cmd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        /* Two column layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @("@")media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="font-sans bg-base-100 border-b border-base-300">
        <div class="mx-auto max-w-7xl flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-6">
                <a href="/@tenantId/dashboard" class="text-base font-semibold tracking-tight text-base-content">evlibre</a>
                <nav class="flex gap-5 text-sm">
                    <a href="/@tenantId/dashboard" class="text-base-content/70 hover:text-base-content">Dashboard</a>
                    <a href="/@tenantId/stations" class="text-base-content/70 hover:text-base-content">Stations</a>
                </nav>
            </div>
            <div class="text-xs text-base-content/60">
                Tenant <span class="ml-1 font-mono text-base-content">@tenantId</span>
            </div>
        </div>
    </header>

    <main>
        <div class="mx-auto max-w-7xl px-4 py-8">
            @body
        </div>
    </main>

    <footer class="font-sans border-t border-base-300 mt-12 py-4 text-center text-xs text-base-content/50">
        evlibre · open source EV charging platform
    </footer>
</body>
</html>
