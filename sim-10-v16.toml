[defaults]
server_url = "ws://localhost:9090"
heartbeat_interval = 30
meter_interval = 10

[profiles.terra-ac]
vendor = "ABB"
model = "Terra AC W22-T-0"
protocol = "ocpp1.6"
evse_count = 1
id_tags = ["TAG001", "TAG002"]

[profiles.evlink]
vendor = "Schneider Electric"
model = "EVlink City"
protocol = "ocpp1.6"
evse_count = 1
id_tags = ["TAG001"]

# 7 AC chargers auto-charging
[[fleets]]
tenant = "demo-tenant"
prefix = "AC"
count = 7
profile = "terra-ac"
behavior = "auto-charge"

# 3 EVlink chargers idle (available for commands)
[[fleets]]
tenant = "demo-tenant"
prefix = "EL"
count = 3
profile = "evlink"
behavior = "idle"
